<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Michelin Chef AI</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    body {
      font-family: 'Inter', sans-serif;
      background-color: #0a0a0a;
      color: #e5e5e5;
    }
    h1, h2, h3, h4, .serif { font-family: 'Playfair Display', serif; }

    .gold-gradient {
      background: linear-gradient(135deg, #d4af37 0%, #f1d592 50%, #d4af37 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .gold-border { border-color: rgba(212, 175, 55, 0.35); }
    .chef-card {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(12px);
    }
    .mode-card {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.08);
      transition: all 0.2s ease;
      cursor: pointer;
    }
    .mode-card:hover { background: rgba(212,175,55,0.08); border-color: rgba(212,175,55,0.4); transform: translateY(-2px); }
    .mode-card.selected { background: rgba(212,175,55,0.12); border-color: rgba(212,175,55,0.7); }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
    @keyframes pulse-gold {
      0%, 100% { box-shadow: 0 0 0 0 rgba(212,175,55,0.4); }
      50%       { box-shadow: 0 0 0 10px rgba(212,175,55,0); }
    }
    .animate-fade-up   { animation: fadeUp 0.5s ease both; }
    .animate-fade-in   { animation: fadeIn 0.4s ease both; }
    .animate-pulse-gold { animation: pulse-gold 2s infinite; }

    .delay-100 { animation-delay: 0.1s; }
    .delay-200 { animation-delay: 0.2s; }
    .delay-300 { animation-delay: 0.3s; }

    input[type="checkbox"].ingredient-check {
      accent-color: #d4af37;
      width: 1.1rem; height: 1.1rem;
      cursor: pointer;
      flex-shrink: 0;
    }
    input[type="range"] { accent-color: #d4af37; }

    @media print {
      header, nav, button, .no-print { display: none !important; }
      body { background: white; color: black; }
      .chef-card { border: 1px solid #ccc; background: white; }
      .gold-gradient { -webkit-text-fill-color: #b8860b; color: #b8860b; }
    }

    .drop-zone {
      border: 2px dashed rgba(212,175,55,0.3);
      transition: all 0.2s ease;
    }
    .drop-zone:hover, .drop-zone.drag-over {
      border-color: rgba(212,175,55,0.7);
      background: rgba(212,175,55,0.05);
    }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #111; }
    ::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #d4af37; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
